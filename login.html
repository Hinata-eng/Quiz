<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — QuizMind</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="css/login.css">
</head>

<body class="login-body">

    <!-- Stars (generated by JS) -->
    <div id="stars-container"></div>

    <!-- Planet glows -->
    <div class="planet-glow"></div>
    <div class="planet-glow-2"></div>

    <!-- Floating sparkles -->
    <div class="sparkle sparkle--tl">
        <svg width="32" height="32" viewBox="0 0 28 28" fill="none"><path d="M14 2L15.8 11.2L25 13L15.8 14.8L14 24L12.2 14.8L3 13L12.2 11.2L14 2Z" fill="white" fill-opacity="0.8"/></svg>
    </div>
    <div class="sparkle sparkle--tr">
        <svg width="22" height="22" viewBox="0 0 28 28" fill="none"><path d="M14 2L15.8 11.2L25 13L15.8 14.8L14 24L12.2 14.8L3 13L12.2 11.2L14 2Z" fill="white" fill-opacity="0.6"/></svg>
    </div>
    <div class="sparkle sparkle--ml">
        <svg width="16" height="16" viewBox="0 0 28 28" fill="none"><path d="M14 2L15.8 11.2L25 13L15.8 14.8L14 24L12.2 14.8L3 13L12.2 11.2L14 2Z" fill="white" fill-opacity="0.4"/></svg>
    </div>
    <div class="sparkle sparkle--mr">
        <svg width="20" height="20" viewBox="0 0 28 28" fill="none"><path d="M14 2L15.8 11.2L25 13L15.8 14.8L14 24L12.2 14.8L3 13L12.2 11.2L14 2Z" fill="white" fill-opacity="0.5"/></svg>
    </div>

    <!-- Card -->
    <div class="login-card">

        <!-- App icon -->
        <div class="login-icon-wrap">
            <div class="login-icon">
                <svg width="34" height="34" viewBox="0 0 28 28" fill="none">
                    <path d="M14 1L16.5 10.5L26 13L16.5 15.5L14 25L11.5 15.5L2 13L11.5 10.5L14 1Z" fill="white"/>
                </svg>
            </div>
        </div>

        <!-- Title -->
        <div class="login-title-block">
            <h1 class="login-title">Welcome to QuizMind<span class="login-title-star">✦</span></h1>
            <p class="login-subtitle">Sign in to continue your learning journey.<br>Your progress is saved to your account.</p>
        </div>

        <!-- Form -->
        <form id="login-form" class="login-form" novalidate>

            <!-- First + Last name -->
            <div class="name-row">
                <div class="form-group">
                    <input type="text" id="firstName" name="firstName" class="login-input" placeholder="First name" autocomplete="given-name">
                    <span class="form-error" id="firstName-error"></span>
                </div>
                <div class="form-group">
                    <input type="text" id="lastName" name="lastName" class="login-input" placeholder="Last name" autocomplete="family-name">
                    <span class="form-error" id="lastName-error"></span>
                </div>
            </div>

            <!-- Email -->
            <div class="form-group">
                <input type="email" id="email" name="email" class="login-input" placeholder="email@example.com" autocomplete="email">
                <span class="form-error" id="email-error"></span>
            </div>

            <!-- Password -->
            <div class="form-group">
                <div class="password-wrap">
                    <input type="password" id="password" name="password" class="login-input" placeholder="••••••••••" autocomplete="current-password">
                    <button type="button" class="eye-btn" id="toggle-password" aria-label="Show password">
                        <i class="fa-regular fa-eye" id="eye-icon"></i>
                    </button>
                </div>
                <span class="form-error" id="password-error"></span>
            </div>

            <!-- Terms -->
            <label class="terms-label">
                <input type="checkbox" id="terms-checkbox" class="terms-checkbox">
                <span class="terms-checkbox-custom"></span>
                <span class="terms-text">
                    I agree to the <a href="#" class="terms-link">Terms of service</a> and <a href="#" class="terms-link">Privacy Policy</a> of QuizMind
                </span>
            </label>
            <span class="form-error" id="terms-error"></span>

            <!-- Submit -->
            <button type="submit" class="login-submit-btn" id="login-submit">
                <span id="login-btn-text">SIGN IN</span>
                <i class="fa-solid fa-spinner fa-spin" id="login-spinner" style="display:none;"></i>
            </button>

        </form>

        <!-- Divider -->
        <div class="social-divider">
            <span class="social-divider-line"></span>
            <span class="social-divider-text">OR CONTINUE WITH</span>
            <span class="social-divider-line"></span>
        </div>

        <!-- Social buttons -->
        <div class="social-btns">
            <button type="button" class="social-btn" title="Apple">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
            </button>
            <button type="button" class="social-btn" title="Google">
                <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                    <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 0 1-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
                    <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
                    <path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
                    <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
                </svg>
            </button>
            <button type="button" class="social-btn" title="Facebook">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="#1877F2"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
            </button>
        </div>

        <p style="text-align:center; margin-top:20px; font-size:0.8rem; color:rgba(200,200,240,0.45);">
            Don't have an account? <a href="signup.html" style="color:#a78bfa; font-weight:600;">Sign Up</a>
        </p>

    </div>

    <script src="js/login.js"></script>

</body>
</html>
